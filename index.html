<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cumpleaños Jesús</title>
    <link rel="stylesheet" href="style.css">
   <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Rokkitt:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<body>

    <div class="hero">
        <img src="assets/twentytwo.png" alt="cumpleaños 22" class="imagen-hero">

        <div class="overlay-text">
            <p>Cumpleaños</p>
            <h1>Jesús</h1>
            <p class="fecha">16/05/26</p>
        </div>
    </div>

    <div class="pantalla-celular">
        <div class="espacio-inicial"></div>
        
        

        <main class="contenido-principal">
            
            <div class="info-evento">
                <p>ACOMPÁÑAME A FESTEJAR EL</p>
                <h2 class="fecha">VIERNES 16 DE MAYO</h2>
                <p class="hora">09:00 PM</p>
            
                <div class="lugar-contenedor">
                    <p class="nombre-lugar">Granja Daniel’s</p>
                    <p class="direccion">
                        C. Nectarina, 31183 Chihuahua, Chih.<br>
                    </p>
                    <div class="mapa">
                        <div class="mapa">
                            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3497.891280583068!2d-106.1576578!3d28.7526628!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x86ea410047d0fde7%3A0x381cabcd413438d!2sGranja%20Daniel%E2%80%99s!5e0!3m2!1ses-419!2smx!4v1776222892465!5m2!1ses-419!2smx" width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                        </div>
                    </div>
                </div>

                <div class="vestimenta">
                    <p>DRESS CODE:</p>
                    <p><strong>FORMAL / BLACK & SILVER</strong></p>
                </div>
            </div>

        </main>
            
        <section class="seccion-contador">
            <p>FALTAN:</p>
            <div id="contador">
                <div class="tiempo">
                    <span id="dias">00</span>
                    <small>Días</small>
                </div>
                <div class="tiempo">
                    <span id="horas">00</span>
                    <small>Hrs</small>
                </div>
                <div class="tiempo">
                    <span id="minutos">00</span>
                    <small>Min</small>
                </div>
                <div class="tiempo">
                    <span id="segundos">00</span>
                    <small>Seg</small>
                </div>
            </div>
        </section>
        
        <section class="formulario">
            <h2>Confirmua tu asistencia</h2>

            <section class="formulario">
    <h2>CONFIRMA TU ASISTENCIA</h2>

    <form id="formAsistencia">
        <input type="text" name="nombre" placeholder="Tu nombre" required>

        <select name="asistencia" required>
            <option value="">¿Asistirás?</option>
            <option value="Sí">Sí</option>
            <option value="No">No</option>
        </select>

        <input type="number" name="acompanantes" placeholder="Acompañantes" min="0" required>

        <button type="submit">Confirmar</button>
    </form>

    <p id="mensaje"></p>
</section>
        </section>
     
        
        

    </div>

    <script src="script.js"></script>
</body>
</html>
